{% extends 'base.html' %}

{% block title %}Logowanie - Serwis RTV{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card">
            <div class="card-header text-center">
                <i class="bi bi-box-arrow-in-right"></i> Logowanie
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Nazwa użytkownika</label>
                        <input type="text" class="form-control" id="id_username" name="username" required autofocus>
                    </div>
                    
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Hasło</label>
                        <input type="password" class="form-control" id="id_password" name="password" required>
                    </div>
                    
                    {% if form.errors %}
                        <div class="alert alert-danger">
                            <i class="bi bi-exclamation-triangle"></i> Niepoprawna nazwa użytkownika lub hasło.
                        </div>
                    {% endif %}
                    
                    <button type="submit" class="btn btn-primary w-100 py-2">
                        <i class="bi bi-box-arrow-in-right"></i> Zaloguj się
                    </button>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <p class="mb-0">Nie masz konta?</p>
                    <a href="{% url 'register' %}" class="btn btn-outline-primary mt-2">
                        <i class="bi bi-person-plus"></i> Zarejestruj się
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
